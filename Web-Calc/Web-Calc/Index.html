<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech&display=swap" rel="stylesheet">

    <title>Calculadora Virtual</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <header>
        <h1> Calculadora Simples</h1>
    </header>

    <main class="calc">
        <table>
            <tr>
                <th colspan="5" id="tela"> 5+5 </th>
            </tr>
            
            <tr><!-- row gap --></tr>
            
            <tr>
                <td id="apagar"> C </td>
                <td class="operador"> ( </td>
                <td class="operador"> ) </td>
                <td class="operador"> [ </td>                
                <td class="operador"> ] </td>
            </tr>
            
            <tr>
                <td class="numerador"> 7 </td>
                <td class="numerador"> 8 </td>
                <td class="numerador"> 9 </td>
                <td class="operador"> / </td>                
                <td class="operador"> % </td>
            </tr>
            
            <tr>
                <td class="numerador"> 4 </td>
                <td class="numerador"> 5 </td>
                <td class="numerador"> 6 </td>
                <td class="operador"> * </td>
                <td class="operador"> √ </td>
            </tr>

            <tr>
                <td class="numerador"> 3 </td>
                <td class="numerador"> 2 </td>
                <td class="numerador"> 1 </td>
                <td class="operador"> - </td>
                <td class="operador"> ^ </td>
            </tr>

            <tr>
                <td colspan="3" class="numerador"> 0 </td>
                <td class="operador"> + </td>
                <td id="resultado"> = </td>
            </tr>

        </table>
    </main>

    <script src="script.js">    </script>
    
</body>
</html>
